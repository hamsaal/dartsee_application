/api/v1/games:
  get:
    summary: Get all games
    tags:
      - Games
    parameters:
      - in: query
        name: page
        schema:
          type: integer
          default: 1
          minimum: 1
        description: Page number
      - in: query
        name: limit
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
        description: Number of games per page
    responses:
      200:
        description: Paginated list of games
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: integer
                      type:
                        type: string
                total:
                  type: integer
      500:
        description: Internal server error
