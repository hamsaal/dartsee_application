paths:
  /api/v1/games:
    get:
      summary: Get all games
      tags:
        - Games
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Number of games per page
      responses:
        200:
          description: Paginated list of games
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        type:
                          type: string
                  total:
                    type: integer
        500:
          description: Internal server error

  /api/v1/games/{id}:
    get:
      summary: Get game detail by ID
      tags:
        - Games
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Game ID
      responses:
        200:
          description: Game detail with players, avg score per round and miss count
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  type:
                    type: string
                  players:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        avg_score:
                          type: number
                        miss_count:
                          type: integer
        400:
          description: Invalid game ID
        404:
          description: Game not found
        500:
          description: Internal server error
